<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeoBot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🌿</span>
                <h1>Homeo<span>Bot</span></h1>
            </div>
            <p>AI-POWERED HOMEOPATHIC ASSISTANT</p>
            <div class="status">
                <div class="status-dot"></div>
                Online & Ready
            </div>
            <a href="/history" style="display:inline-block; margin-top:8px; font-size:12px; color:#10b981; text-decoration:none; border:1px solid rgba(16,185,129,0.3); padding:4px 12px; border-radius:20px;">📋 View Patient History</a>
        </div>

        <!-- Patient name input -->
        <div class="name-banner">
            <label>Patient:</label>
            <input type="text" id="patientName" placeholder="Enter patient name (optional)" />
        </div>

        <!-- Chat messages -->
        <div class="chatbox" id="chatbox">
            <div class="bot-message">
                Welcome to HomeoBot 🌿 I'm your homeopathic medicine assistant.<br><br>
                Describe your symptoms and I'll suggest the right remedies with potency and dosage.
            </div>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <input
                type="text"
                id="symptomInput"
                placeholder="Describe your symptoms..."
            />
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

    <script src="/static/script.js"></script>
</body>
</html>
